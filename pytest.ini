[pytest]
# Feature 005: канонический вызов `.\venv\Scripts\pytest` из корня проекта.
# pythonpath = . кладёт корень в sys.path на этапе collection, чтобы
# tests/conftest.py мог импортировать пакеты проекта (database, services, ...).
# Ранее работал только `python -m pytest` (неявно добавлял cwd). См.
# specs/005-tooling-remediation/contracts/canonical-test-invocation.md
pythonpath = .
testpaths = tests
