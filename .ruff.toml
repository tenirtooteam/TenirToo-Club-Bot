# Configuration for Ruff Linter
line-length = 120
target-version = "py311"

# Exclude common directories
exclude = [
    ".git",
    ".pytest_cache",
    "venv",
    "__pycache__",
    "obsolete_tests"
]

[lint]
# Enable rules:
# F - Pyflakes (typos, unused code, undefined variables)
# E, W - pycodestyle (style guidelines)
# ASYNC - flake8-async (missing awaits, async patterns)
# TID251 - flake8-tidy-imports (banned-api rule only)
select = ["F", "E", "W", "ASYNC", "TID251"]

# Ignore minor styling checks that might pollute output unnecessarily
ignore = [
    "E501", # Line too long
    "E701", # Multiple statements on one line (colon)
]

[lint.per-file-ignores]
# Allow unused imports and star imports in init files for modular exports
"**/__init__.py" = ["F401", "F403"]
# Allow unused imports in the database facade layer for re-exports
"database/db.py" = ["F401"]
# Allow banned imports in presentation, test, middleware, keyboard, service, and web layers
"handlers/**/*.py" = ["TID251"]
"tests/**/*.py" = ["TID251"]
"middlewares/**/*.py" = ["TID251"]
"keyboards/**/*.py" = ["TID251"]
"services/**/*.py" = ["TID251"]
"web/**/*.py" = ["TID251"]

[lint.flake8-tidy-imports.banned-api]
"aiogram.Router".msg = "aiogram.Router is banned outside the presentation layer. Routers must be declared inside handlers/ directory."
"aiogram.types".msg = "aiogram.types is banned in main.py and database to prevent UI/handler logic leakage."
